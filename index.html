<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Primary  Meta Tags (fallback before JS loads - react-helmet-async will override) -->
    <title>Vuen AI – Visual Data Agent for Real-Time Business Intelligence</title>
    <meta name="description" content="Talk to a 3D orb and get live charts, flows, and explanations from your own data in seconds. Vuen AI is a voice-first Visual Data Agent for real-time business intelligence." />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f1726" />
    <meta name="msapplication-TileColor" content="#0f1726" />

    <!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vuen AI" />
    <meta property="og:url" content="https://vuen.ai/" />
    <meta property="og:title" content="Vuen AI – Visual Data Agent for Real-Time Business Intelligence" />
    <meta property="og:description" content="Talk to a 3D orb and get live charts, flows, and explanations from your own data in seconds." />
    <meta property="og:image" content="https://vuen.ai/assets/og/vuen-og-default.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Vuen AI - Visual Data Agent with glowing orb interface" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@vuen_ai" />
    <meta name="twitter:creator" content="@vuen_ai" />
    <meta name="twitter:title" content="Vuen AI – Visual Data Agent for Real-Time Business Intelligence" />
    <meta name="twitter:description" content="Talk to a 3D orb and get live charts, flows, and explanations from your own data in seconds." />
    <meta name="twitter:image" content="https://vuen.ai/assets/og/vuen-og-default.svg" />
    <meta name="twitter:image:alt" content="Vuen AI - Visual Data Agent with glowing orb interface" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var pref = 'system';
        try { pref = localStorage.getItem('vuen-theme-preference') || 'system'; } catch(e) {}
        if (pref !== 'dark' && pref !== 'light' && pref !== 'system') pref = 'system';
        var theme = pref;
        if (pref === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(theme);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
